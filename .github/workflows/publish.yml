name: Build and publish PostPilot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-postpilot-main
  cancel-in-progress: false

jobs:
  publish:
    # The GitOps commit this workflow creates must not trigger another image build.
    if: "!contains(github.event.head_commit.message, 'chore(deploy):')"
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postpilot
          POSTGRES_USER: postpilot
          POSTGRES_PASSWORD: postpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postpilot -d postpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postpilot:postpilot@localhost:5432/postpilot
      NEXTAUTH_SECRET: postpilot-ci-auth-secret
      NEXTAUTH_URL: http://localhost:5001
      POSTPILOT_DEBUG_DEMO: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec next typegen
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:all
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Resolve the ECR repository name
        id: image
        run: |
          echo "name=${{ vars.ECR_REPOSITORY_URL }}" >> "$GITHUB_OUTPUT"
          # ECR tags are immutable. The run ID makes a retry or a separately
          # dispatched build of the same commit publishable without replacing
          # an existing image, while retaining the commit SHA for traceability.
          echo "tag=${GITHUB_SHA}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
        with:
          mask-password: true
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: migrations
          push: true
          tags: ${{ steps.image.outputs.name }}:migrations-${{ steps.image.outputs.tag }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: seed
          push: true
          tags: ${{ steps.image.outputs.name }}:seed-${{ steps.image.outputs.tag }}
      - name: Commit the immutable image references for Argo CD
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          # Replace the value of each image field, whether it is still the
          # local placeholder or an immutable ECR reference from a prior run.
          sed -i -E "s|^([[:space:]]*image:)[[:space:]]+[^[:space:]]+|\\1 ${IMAGE}:${IMAGE_TAG}|" deploy/kubernetes/base/deployment.yaml
          sed -i -E "s|^([[:space:]]*image:)[[:space:]]+[^[:space:]]+|\\1 ${IMAGE}:migrations-${IMAGE_TAG}|" deploy/kubernetes/base/migration-job.yaml
          sed -i -E "s|^([[:space:]]*image:)[[:space:]]+[^[:space:]]+|\\1 ${IMAGE}:seed-${IMAGE_TAG}|" deploy/kubernetes/jobs/demo-seed.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kubernetes/base/deployment.yaml deploy/kubernetes/base/migration-job.yaml deploy/kubernetes/jobs/demo-seed.yaml
          git diff --cached --quiet || git commit -m "chore(deploy): postpilot ${IMAGE_TAG}"
          git push

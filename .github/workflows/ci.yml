name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type, lint, and full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postpilot
          POSTGRES_USER: postpilot
          POSTGRES_PASSWORD: postpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postpilot -d postpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postpilot:postpilot@localhost:5432/postpilot
      NEXTAUTH_SECRET: postpilot-ci-auth-secret
      NEXTAUTH_URL: http://localhost:5001
      POSTPILOT_DEBUG_DEMO: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec next typegen
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:all

  infrastructure:
    name: Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

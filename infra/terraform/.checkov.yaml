# PostPilot deliberately uses a small, public-subnet EKS demonstration stack
# without a NAT gateway, Multi-AZ database, or paid observability add-ons.
# These documented exceptions keep Checkov strict for future changes while
# avoiding false expectations that this cost-conscious demo is production HA.
skip-check:
  # AWS-managed ECR encryption is adequate for public demo container images.
  - CKV_AWS_136
  # Nodes are deliberately in public subnets so the demo works without NAT.

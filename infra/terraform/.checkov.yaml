  # The EKS API is public but CIDR-restricted to the operator's address.
  - CKV_AWS_39
  # KMS envelope encryption and full EKS control-plane logs add recurring cost.
  - CKV_AWS_58
  - CKV_AWS_37
  # RDS is a low-cost, single-AZ demo database. These are production hardening
  # controls to enable before handling real customer data.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postpilot
  namespace: postpilot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postpilot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postpilot
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postpilot
          image: 778183943831.dkr.ecr.eu-west-1.amazonaws.com/postpilot:ac4d0b39beb39de272f7158aef08b91ee0b10359-29821115718
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: postpilot-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

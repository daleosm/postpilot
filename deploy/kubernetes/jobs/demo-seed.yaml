# This Job is intentionally excluded from the Argo CD Kustomization. Apply it
# once for a disposable demo/pilot workspace; never use it for facility data.
apiVersion: batch/v1
kind: Job
metadata:
  name: postpilot-demo-seed
  namespace: postpilot
  labels:
    app.kubernetes.io/name: postpilot-demo-seed
    app.kubernetes.io/part-of: postpilot
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postpilot-demo-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: 778183943831.dkr.ecr.eu-west-1.amazonaws.com/postpilot:seed-f07f0d050c2b3c875ca5a2ef65a2155e3d50b397-29995504683
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postpilot-secrets
